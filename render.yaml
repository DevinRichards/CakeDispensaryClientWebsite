services:
  - type: web
    name: cake-dispensary-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: cake-dispensary-data
      mountPath: /var/data/cake-dispensary
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/cake-dispensary
      - key: PUBLIC_API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_ADMIN_EMAILS
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: STORE_EMAIL
        sync: false
      - key: BIOTRACK_API_URL
        sync: false
      - key: BIOTRACK_ORDER_API_URL
        sync: false
      - key: BIOTRACK_LICENSE_NUMBER
        sync: false
      - key: BIOTRACK_FACILITY_KEY
        sync: false
      - key: BIOTRACK_USERNAME
        sync: false
      - key: BIOTRACK_PASSWORD
        sync: false
      - key: BIOTRACK_ORDER_LOCATION
        sync: false

  - type: static
    name: cake-dispensary-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
